# NATS Server Configuration for OceanOps
# Enables WebSocket for browser connectivity and JetStream for message persistence

port: 4222

# WebSocket listener for browser clients (nats.ws)
websocket {
  port: 9222
  no_tls: true  # Dev only - enable TLS in production
}

# JetStream for message persistence and replay
jetstream {
  store_dir: "./data/jetstream"
  max_memory_store: 256MB
  max_file_store: 1GB
}

# Logging
debug: false
trace: false
logtime: true
